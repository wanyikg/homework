<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日式方块对对碰</title>
  <style>
    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }

    html, body {
      min-height: 100%;
      background: linear-gradient(180deg, #111827 0%, #0b1220 100%);
      color: #f8fafc;
      font-family: "Microsoft YaHei", Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }

    .wrapper {
      width: min(100%, 960px);
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 18px;
      align-items: start;
    }

    .panel {
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      padding: 22px;
      overflow: hidden;
    }

    .game-box {
      width: 100%;
      min-height: 660px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #gameCanvas {
      width: 100%;
      height: auto;
      max-width: 100%;
      aspect-ratio: 8 / 14;
      border-radius: 22px;
      box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.06);
      background: #0b1220;
    }

    .stats {
      display: grid;
      gap: 14px;
    }

    .stats h1 {
      font-size: clamp(1.6rem, 2.4vw, 2.2rem);
      margin-bottom: 8px;
      letter-spacing: 0.08em;
      color: #f8fafc;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid rgba(148, 163, 184, 0.14);
      font-size: 1rem;
    }

    .stat-item span:first-child {
      color: #94a3b8;
    }

    .stat-item span:last-child {
      font-weight: 700;
      color: #f1f5f9;
    }

    .color-block {
      display: inline-block;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      border: 2px solid rgba(255, 255, 255, 0.24);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.05);
      vertical-align: middle;
    }

    .controls {
      margin-top: 18px;
      display: grid;
      gap: 12px;
    

    .controls button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 1rem;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #ec4899, #6366f1);
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    .controls button:hover {
      transform: translateY(-1px);
      filter: brightness(1.07);
    }

    .hint {
      margin-top: 20px;
      color: #cbd5e1;
      font-size: 0.95rem;
      line-height: 1.7;
    }

    .hint strong {
      color: #fff;
    }

    @media (max-width: 860px) {
      .wrapper {
        grid-template-columns: 1fr;
      }
      .game-box {
        min-height: 560px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <section class="panel game-box">
      <canvas id="gameCanvas" width="288" height="504"></canvas>
    </section>

    <aside class="panel stats">
      <h1>日式方块对对碰</h1>
      <div class="stat-item"><span>得分</span><span id="scoreValue">0</span></div>
      <div class="stat-item"><span>关卡</span><span id="levelValue">1</span></div>
      <div class="stat-item"><span>连击</span><span id="comboValue">0</span></div>
      <div class="stat-item"><span>下一个方块</span><span id="nextValue" class="color-block"></span></div>
      <div class="controls">
        <button id="restartBtn">重新开始</button>
        <button id="pauseBtn">暂停 / 继续</button>
      </div>
      <div class="hint">
        <strong>玩法：</strong>使用键盘控制方块下落。<br />
        三个或以上相同方块相邻可消除。<br />
        每过一关，落速加快、颜色更多、难度提升。<br />
        建议在笔记本屏幕上全屏浏览体验最佳。
      </div>
    </aside>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreValue = document.getElementById('scoreValue');
    const levelValue = document.getElementById('levelValue');
    const comboValue = document.getElementById('comboValue');
    const nextValue = document.getElementById('nextValue');
    const restartBtn = document.getElementById('restartBtn');
    const pauseBtn = document.getElementById('pauseBtn');

    const COLS = 8;
    const ROWS = 14;
    const BLOCK_SIZE = 36;
    const BOARD_WIDTH = COLS * BLOCK_SIZE;
    const BOARD_HEIGHT = ROWS * BLOCK_SIZE;

    const colors = ['#f43f5e', '#fb7185', '#38bdf8', '#34d399', '#f59e0b', '#8b5cf6', '#f97316'];
    const colorGroups = [4, 5, 6, 7];

    let board = createBoard();
    let current = null;
    let next = null;
    let score = 0;
    let level = 1;
    let combo = 0;
    let dropInterval = 700;
    let dropCounter = 0;
    let lastTime = 0;
    let paused = false;
    let gameOver = false;

    window.addEventListener('resize', resizeCanvas);
    restartBtn.addEventListener('click', startGame);
    pauseBtn.addEventListener('click', togglePause);

    document.addEventListener('keydown', event => {
      if (!current || paused || gameOver) return;
      switch (event.code) {
        case 'ArrowLeft':
          move(-1);
          break;
        case 'ArrowRight':
          move(1);
          break;
        case 'ArrowDown':
          softDrop();
          break;
        case 'Space':
          hardDrop();
          break;
      }
    });

    function createBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    }

    function activeColorCount() {
      return colorGroups[Math.min(level - 1, colorGroups.length - 1)];
    }

    function randomColorIndex() {
      return Math.floor(Math.random() * activeColorCount()) + 1;
    }

    function createBlock() {
      return { row: 0, col: Math.floor(COLS / 2), color: randomColorIndex() };
    }

    function spawnBlock() {
      current = next || createBlock();
      current.row = 0;
      current.col = Math.floor(COLS / 2);
      next = createBlock();
      if (board[current.row][current.col] !== 0) {
        endGame();
      }
      updateStats();
    }

    function move(direction) {
      const x = current.col + direction;
      if (x >= 0 && x < COLS && board[current.row][x] === 0) {
        current.col = x;
      }
    }

    function softDrop() {
      if (canFall(current.row + 1, current.col)) {
        current.row++;
      } else {
        landBlock();
      }
      dropCounter = 0;
    }

    function hardDrop() {
      while (canFall(current.row + 1, current.col)) {
        current.row++;
      }
      landBlock();
      dropCounter = 0;
    }

    function canFall(row, col) {
      return row < ROWS && board[row][col] === 0;
    }

    function landBlock() {
      board[current.row][current.col] = current.color;
      const cleared = cascade();
      if (cleared > 0) {
        combo++;
        score += 80 * cleared * combo;
      } else {
        combo = 0;
      }
      applyGravity();
      updateLevel();
      spawnBlock();
    }

    function cascade() {
      let total = 0;
      while (true) {
        const group = findGroups();
        if (!group.length) break;
        group.forEach(([x, y]) => { board[y][x] = 0; });
        total += group.length;
        applyGravity();
      }
      return total;
    }

    function findGroups() {
      const visited = createBoard();
      const remove = [];
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          if (board[y][x] && !visited[y][x]) {
            const cluster = floodFill(x, y, board[y][x], visited);
            if (cluster.length >= 3) remove.push(...cluster);
          }
        }
      }
      return remove;
    }

    function floodFill(x, y, color, visited) {
      const stack = [[x, y]];
      const cluster = [];
      visited[y][x] = 1;
      while (stack.length) {
        const [cx, cy] = stack.pop();
        cluster.push([cx, cy]);
        [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx, dy]) => {
          const nx = cx + dx;
          const ny = cy + dy;
          if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && !visited[ny][nx] && board[ny][nx] === color) {
            visited[ny][nx] = 1;
            stack.push([nx, ny]);
          }
        });
      }
      return cluster;
    }

    function applyGravity() {
      for (let x = 0; x < COLS; x++) {
        let target = ROWS - 1;
        for (let y = ROWS - 1; y >= 0; y--) {
          if (board[y][x] !== 0) {
            if (y !== target) {
              board[target][x] = board[y][x];
              board[y][x] = 0;
            }
            target--;
          }
        }
      }
    }

    function updateLevel() {
      const nextLevel = Math.floor(score / 1000) + 1;
      if (nextLevel !== level) {
        level = nextLevel;
        dropInterval = Math.max(160, 700 - (level - 1) * 60);
      }
    }

    function drawBackground() {
      const bg = ctx.createLinearGradient(0, 0, BOARD_WIDTH, BOARD_HEIGHT);
      bg.addColorStop(0, '#0b1220');
      bg.addColorStop(1, '#111827');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, BOARD_WIDTH, BOARD_HEIGHT);
      ctx.strokeStyle = 'rgba(148, 163, 184, 0.15)';
      ctx.lineWidth = 2;
      ctx.strokeRect(1, 1, BOARD_WIDTH - 2, BOARD_HEIGHT - 2);
    }

    function drawGrid() {
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1;
      for (let x = 1; x < COLS; x++) {
        ctx.beginPath();
        ctx.moveTo(x * BLOCK_SIZE, 0);
        ctx.lineTo(x * BLOCK_SIZE, BOARD_HEIGHT);
        ctx.stroke();
      }
      for (let y = 1; y < ROWS; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * BLOCK_SIZE);
        ctx.lineTo(BOARD_WIDTH, y * BLOCK_SIZE);
        ctx.stroke();
      }
    }

    function drawBlock(x, y, colorIndex) {
      const xPos = x * BLOCK_SIZE;
      const yPos = y * BLOCK_SIZE;
      const active = colors[colorIndex - 1] || '#ffffff';
      ctx.fillStyle = active;
      ctx.strokeStyle = '#111827';
      ctx.lineWidth = 5;
      ctx.fillRect(xPos + 2, yPos + 2, BLOCK_SIZE - 4, BLOCK_SIZE - 4);
      ctx.strokeRect(xPos + 2, yPos + 2, BLOCK_SIZE - 4, BLOCK_SIZE - 4);
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(xPos + 8, yPos + 8, BLOCK_SIZE - 16, BLOCK_SIZE - 16);
    }

    function drawBoard() {
      drawBackground();
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          if (board[y][x]) {
            drawBlock(x, y, board[y][x]);
          }
        }
      }
      if (current) {
        drawBlock(current.col, current.row, current.color);
      }
      drawGrid();
    }

    function drawNext() {
      const color = colors[next.color - 1] || '#fff';
      nextValue.textContent = '';
      nextValue.style.backgroundColor = color;
      nextValue.style.borderColor = '#ffffff';
    }

    function updateStats() {
      scoreValue.textContent = score;
      levelValue.textContent = level;
      comboValue.textContent = combo;
      drawNext();
    }

    function resizeCanvas() {
      const containerWidth = canvas.parentElement.clientWidth;
      const maxHeight = window.innerHeight - 80;
      const scale = Math.min(containerWidth / BOARD_WIDTH, maxHeight / BOARD_HEIGHT, 1.0);
      canvas.style.width = `${BOARD_WIDTH * scale}px`;
      canvas.style.height = `${BOARD_HEIGHT * scale}px`;
      canvas.width = BOARD_WIDTH;
      canvas.height = BOARD_HEIGHT;
      drawBoard();
    }

    function update(time = 0) {
      if (paused || gameOver) return;
      const delta = time - lastTime;
      lastTime = time;
      dropCounter += delta;
      if (dropCounter > dropInterval) {
        softDrop();
      }
      drawBoard();
      requestAnimationFrame(update);
    }

    function togglePause() {
      if (gameOver) return;
      paused = !paused;
      pauseBtn.textContent = paused ? '继续游戏' : '暂停 / 继续';
      if (!paused) {
        lastTime = performance.now();
        requestAnimationFrame(update);
      }
    }

    function endGame() {
      gameOver = true;
      paused = true;
      pauseBtn.textContent = '暂停 / 继续';
      setTimeout(() => {
        alert(`游戏结束！得分：${score}，关卡：${level}`);
      }, 100);
    }

    function startGame() {
      board = createBoard();
      score = 0;
      level = 1;
      combo = 0;
      dropInterval = 700;
      paused = false;
      gameOver = false;
      next = createBlock();
      spawnBlock();
      pauseBtn.textContent = '暂停 / 继续';
      lastTime = performance.now();
      updateStats();
      requestAnimationFrame(update);
    }

    startGame();
  </script>
</body>
</html>
