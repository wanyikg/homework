     <style>
        .container{
            display: grid;
            grid-template-columns: repeat(5,1fr);
            grid-template-columns: 1fr 2fr ;
        }
        .container div:nth-child(even){
            background-color: rgb(45, 229, 45);
            border: 2xp solid black;
        }
        .container div:nth-child(odd){
            background-color: rgb(230, 21, 21);
            border: 2px solid black;
        }

        .container2{
            display: grid;
            grid-template-columns: repeat(5,1fr);
            grid-template-areas: 
                "header header header header header"
                "img1 img2 img3 img4 img5"
                "text1 text1 ext1 text2 text2"
                "footar footar footar footar footar"
        }
        .container2 div:nth-child(1){
        grid-area:header;
        }
        .container2 div:nth-child(2){
            grid-area: img1;
        }
        .container2 div:nth-child(3){
            grid-area:text1;
        }
        .container2 div:nth-child(4){
            grid-area: img2;
        }
        .container2 div:nth-child(5){
            grid-area:text2;
        }
        .container2 div:nth-child(6){
            grid-area: img3;
        }
        .container2 div:nth-child(7){
            grid-area:text3;
        }
        .container2 div:nth-child(8){
            grid-area: img4;
        }
        .container2 div:nth-child(9){
            grid-area: text4;
        }

        </style>
