<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
 <style>
        .list{
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }
 </style>
<body>
    <h1>Multiplication Tables</h1>
    <div class="list">

    </div>
    <script>

        for(let i=1;i<=25;i++){
            document.querySelector(`.list`).innerHTML+=`<div><h2>Multiplication Table of ${i}</h2><div id="MultiplicationTableof${i}"></div></div>`;
            for(let j=1;j<=12;j++){
                document.querySelector(`#MultiplicationTableof${i}`).innerHTML+=`<p>${i}x${j}=${i*j}</p>`;
            }   
        }
    </script>
</body>
</html>
