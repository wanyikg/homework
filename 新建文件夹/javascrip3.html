<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>JavaScript Course 3</h1>
    <p>Welcome to the second course on JavaScript!</p>

    <p id="fruitDisplay"></p>
    <p id="intergerDisplay"></p>
    <script>
        let Fruit="appale"
        let Fruits=["appale","bananan","orange","grap","mango","kiwi","pear","peach"]

        //for loop
        for(let i=0;i<Fruits.lengh;i++){
            document.getElementById("fruitDisplay").innerHTML+=Fruits[i]+"<br>"
        }

        //while loop
        let j=0;
        while(j<Fruits.length){
            document.getElementById("fruitDisplay").innerHTML+=Fruits[j]+"<br>"
            j++;
        }

           
    //do while loop
    let k=0;
    do{
        document.getElementById("fruitDisplay").innerHTML+=Fruits[k]+"<br>";
        k++;
    }while(k<Fruits.length);

    //for each loop
    Fruits.forEach(function(fruit){
        document.getElementById("fruitDisplay").innerHTML+=fruit+"<br>";
    });

    for(let i=1;i<=100;i++){
        document.getElementById("integerDisplay").innerHTML+=i+"<br>";
    }

       

    </script>
</body>
</html>
