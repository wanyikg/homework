     <style>
      
        .animated-box {
            width: 200px;
            height: 100px;
            background-color: lightblue;
            position: relative;
        }
        .bowling-box{   
            position: absolute;
            animation-name: moveforward, boling-rotate;
            animation-duration: 1s, 2s;
            animation-delay: 0s, 1s;
            animation-iteration-count: 1, 1;
            animation-fill-mode: forwards;
            animation-timing-function: linear;
        }
        .bowling-pin-box{  
             width: 200px;
            height: 100px;
            left: 900px;
            top:400px;
            position: absolute;
            animation-name:  bowling-pin-rotate;
            animation-duration:  1s;
            animation-iteration-count: 1;
            animation-fill-mode: forwards;
            animation-timing-function: linear;
            background-color: transparent;
        }
        .bowling-pin-box2{  
             width: 200px;
            height: 100px;
            left: 700px;
            position: absolute;
            animation-name:  bowling-pin-rotate2;
            animation-duration:  1s;
            animation-iteration-count: 1;
            animation-fill-mode: forwards;
            animation-timing-function: linear;
            background-color: transparent;
        }
        .bowling-pin-box3{  
             width: 200px;
            height: 100px;
            left: 500px;
            position: absolute;
            animation-name:  bowling-pin-rotate3;
            animation-duration:  1s;
            animation-iteration-count: 1;
            animation-fill-mode: forwards;
            animation-timing-function: linear;
            background-color: transparent;
        }
        .bowling-pin-box4{  
             width: 200px;
            height: 100px;
            left: 300px;
            position: absolute;
            animation-name:  bowling-pin-rotate4;
            animation-duration:  1s;
            animation-iteration-count: 1;
            animation-fill-mode: forwards;
            animation-timing-function: linear;
            background-color: transparent;
        }
        
        @keyframes moveforward{
            0%{
                left: 0;
            }
            100%{
                left: 1100px;
                transform:rotate(9000deg)
            }
        }
        @keyframes bowling-pin-rotate{
            0%{
                transform: rotate(0deg);
            }
            100%{
                left: 900px;
                transform: rotate(90deg);
            }
        }
          @keyframes bowling-pin-rotate2{
            0%{
                transform: rotate(0deg);
            }
            100%{
                left: 700px;
                transform: rotate(90deg);
            }
        }
         @keyframes bowling-pin-rotate3{
            0%{
                transform: rotate(0deg);
            }
            100%{
                left: 500px;
                transform: rotate(90deg);
            }
        }
         @keyframes bowling-pin-rotate4{
            0%{
                transform: rotate(0deg);
            }
            100%{
                left: 300px;
                transform: rotate(90deg);
            }
        }
        </style>
